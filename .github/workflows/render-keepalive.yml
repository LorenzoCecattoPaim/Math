name: Keep-Alive Render

on:
  # Allows running this workflow manually from the Actions tab.
  workflow_dispatch:

  # Runs automatically every 14 minutes to keep the Render service awake.
  schedule:
    - cron: "*/14 * * * *"

jobs:
  keep-alive:
    # Uses the latest Ubuntu GitHub-hosted runner.
    runs-on: ubuntu-latest

    # Prevents the workflow from hanging too long.
    timeout-minutes: 2

    steps:
      # Sends an HTTP GET request to the Render app.
      # `|| true` ensures this step never fails the job.
      - name: Ping Render URL
        run: |
          curl --silent --show-error --location \
            --retry 5 \
            --retry-delay 5 \
            --max-time 30 \
            --fail \
            "https://provalab.onrender.com" || true
