name: Keep-Alive Render

on:
  # Runs automatically every 10 minutes.
  schedule:
    - cron: "*/10 * * * *"
  # Allows manual trigger from the GitHub Actions UI.
  workflow_dispatch:

jobs:
  keep-alive:
    # Uses the latest Ubuntu GitHub-hosted runner.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      TARGET_URL: ${{ secrets.TARGET_URL }}

    steps:
      # Sends a keep-alive HTTP request and never fails the workflow.
      - name: Ping Render URL
        shell: bash
        run: |
          TS="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "[INFO] ${TS} - Starting keep-alive ping to TARGET_URL"

          curl --silent --show-error --location \
            --max-time 40 \
            --connect-timeout 10 \
            --retry 5 \
            --retry-delay 5 \
            --retry-connrefused \
            "${TARGET_URL}" || true

          echo "[INFO] Keep-alive finished."
